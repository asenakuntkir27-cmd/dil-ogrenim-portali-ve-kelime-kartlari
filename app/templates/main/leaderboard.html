{% extends "base.html" %}

{% block content %}
<div class="mx-auto max-w-7xl py-4 sm:py-6">
    <!-- Header -->
    <div class="mb-8 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
        <div>
            <h1 class="text-3xl font-extrabold tracking-tight text-white bg-gradient-to-r from-white via-zinc-200 to-zinc-400 bg-clip-text text-transparent flex items-center gap-2.5">
                <i class="fa-solid fa-trophy text-yellow-500 animate-bounce"></i> En Yüksek Skorlar (Liderlik Tablosu)
            </h1>
            <p class="mt-2 text-sm text-zinc-400">LingoRose platformundaki oyunlarda en yüksek skorları elde eden oyuncuları keşfedin ve kendi yerinizi alın!</p>
        </div>
        <div>
            <a href="{{ url_for('main.index') }}" class="inline-flex items-center justify-center gap-2 px-4 py-2.5 text-xs font-semibold text-zinc-300 hover:text-white border border-zinc-800 hover:border-zinc-700 bg-zinc-900/30 rounded-xl transition-all duration-200 cursor-pointer">
                <i class="fa-solid fa-chevron-left text-[10px]"></i> Panoya Geri Dön
            </a>
        </div>
    </div>

    <!-- Leaderboard Cards Layout -->
    <div id="leaderboard-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-6">
        <!-- Dynamically loaded via Fetch API -->
        <div class="lg:col-span-full py-20 text-center text-zinc-500">
            <i class="fa-solid fa-spinner fa-spin mr-2 text-pink-500 text-lg"></i>Liderlik tablosu yükleniyor...
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const leaderboardContainer = document.getElementById('leaderboard-container');

        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        async function loadLeaderboard() {
            try {
                const response = await fetch('/api/v1/scores/leaderboard');
                if (!response.ok) throw new Error('Leaderboard fetch failed');
                const data = await response.json();

                let html = '';

                for (const [gameName, players] of Object.entries(data)) {
                    let playersHtml = '';

                    if (players.length === 0) {
                        playersHtml = `
                            <div class="py-12 text-center text-xs text-zinc-500 italic">
                                Henüz skor kaydedilmemiş.<br>İlk skoru siz yapın!
                            </div>
                        `;
                    } else {
                        players.forEach((player, idx) => {
                            let rankBadge = '';
                            let rowBg = 'border-b border-zinc-850/60 last:border-0';
                            
                            // Top 3 style highlights
                            if (idx === 0) {
                                rankBadge = '🥇';
                                rowBg += ' bg-amber-500/5 hover:bg-amber-500/10';
                            } else if (idx === 1) {
                                rankBadge = '🥈';
                                rowBg += ' bg-slate-400/5 hover:bg-slate-400/10';
                            } else if (idx === 2) {
                                rankBadge = '🥉';
                                rowBg += ' bg-amber-700/5 hover:bg-amber-700/10';
                            } else {
                                rankBadge = `<span class="inline-flex h-5 w-5 items-center justify-center rounded-full bg-zinc-800 text-[10px] font-bold text-zinc-400">${idx + 1}</span>`;
                                rowBg += ' hover:bg-zinc-850/35';
                            }

                            playersHtml += `
                                <div class="flex items-center justify-between py-3 px-3 rounded-xl transition-colors ${rowBg}">
                                    <div class="flex items-center gap-2.5 min-w-0">
                                        <span class="text-base shrink-0">${rankBadge}</span>
                                        <span class="text-xs font-semibold text-zinc-200 truncate">${escapeHtml(player.username)}</span>
                                    </div>
                                    <div class="text-right shrink-0">
                                        <span class="text-xs font-bold text-pink-400">${player.score} Puan</span>
                                        <span class="block text-[9px] text-zinc-550 mt-0.5">${player.date}</span>
                                    </div>
                                </div>
                            `;
                        });
                    }

                    // Icon setup based on game name
                    let gameIcon = 'fa-gamepad';
                    let glowColor = 'from-purple-500/10 to-pink-500/10';
                    let iconBg = 'bg-purple-950/40 text-purple-400 border-purple-900/30';
                    
                    if (gameName === 'Kelime Eşleştirme') {
                        gameIcon = 'fa-puzzle-piece';
                        glowColor = 'from-pink-500/10 to-rose-500/10';
                        iconBg = 'bg-pink-950/40 text-pink-400 border-pink-900/30';
                    } else if (gameName === 'Kelime Tetrisi') {
                        gameIcon = 'fa-cubes';
                        glowColor = 'from-purple-500/10 to-indigo-500/10';
                        iconBg = 'bg-purple-950/40 text-purple-400 border-purple-900/30';
                    } else if (gameName === 'Cümle Kurma') {
                        gameIcon = 'fa-align-left';
                        glowColor = 'from-cyan-500/10 to-blue-500/10';
                        iconBg = 'bg-cyan-950/40 text-cyan-400 border-cyan-900/30';
                    } else if (gameName === 'Hafıza Kartları') {
                        gameIcon = 'fa-hourglass-half';
                        glowColor = 'from-fuchsia-500/10 to-pink-500/10';
                        iconBg = 'bg-fuchsia-950/40 text-fuchsia-400 border-fuchsia-900/30';
                    } else if (gameName === 'Boşluk Doldurma') {
                        gameIcon = 'fa-pen-to-square';
                        glowColor = 'from-emerald-500/10 to-teal-500/10';
                        iconBg = 'bg-emerald-950/40 text-emerald-400 border-emerald-900/30';
                    }

                    html += `
                        <div class="bg-zinc-900 border border-zinc-800/80 rounded-2xl p-4 flex flex-col hover:border-pink-500/30 hover:shadow-xl hover:shadow-pink-500/5 transition-all duration-300 relative group/card">
                            <div class="absolute -inset-[1px] bg-gradient-to-r ${glowColor} rounded-2xl opacity-0 group-hover/card:opacity-100 transition-opacity duration-300 pointer-events-none blur-sm"></div>
                            
                            <!-- Card Header -->
                            <div class="flex items-center gap-3 border-b border-zinc-850 pb-3 mb-3 relative">
                                <div class="flex h-9 w-9 items-center justify-center rounded-xl ${iconBg} border shrink-0">
                                    <i class="fa-solid ${gameIcon} text-sm"></i>
                                </div>
                                <h4 class="text-sm font-bold text-zinc-100 truncate">${gameName}</h4>
                            </div>

                            <!-- Players list -->
                            <div class="flex-1 flex flex-col justify-center relative space-y-1">
                                ${playersHtml}
                            </div>
                        </div>
                    `;
                }

                leaderboardContainer.innerHTML = html;
            } catch (error) {
                console.error(error);
                leaderboardContainer.innerHTML = `
                    <div class="lg:col-span-full py-12 text-center text-sm text-rose-450">
                        <i class="fa-solid fa-circle-exclamation mr-2 text-lg"></i>Liderlik tablosu verileri yüklenirken bir hata oluştu.
                    </div>
                `;
            }
        }

        loadLeaderboard();
    });
</script>
{% endblock %}
