{% extends "base.html" %}

{% block content %}
<div class="flex flex-col items-center justify-center text-center py-20 px-4">
    <!-- Pulsing glow icon container -->
    <div class="relative mb-8">
        <div class="absolute inset-0 bg-pink-500/20 blur-xl rounded-full animate-pulse"></div>
        <div class="relative flex h-24 w-24 items-center justify-center rounded-3xl bg-zinc-900 border border-zinc-800 text-pink-505 text-pink-500 shadow-inner">
            <i class="fa-solid fa-face-frown text-5xl animate-bounce"></i>
        </div>
    </div>

    <!-- Error title and explanation -->
    <h1 class="text-4xl font-extrabold tracking-tight text-white sm:text-5xl bg-gradient-to-r from-white to-zinc-400 bg-clip-text text-transparent">
        404 - Sayfa Bulunamadı
    </h1>
    <p class="mt-4 text-base text-zinc-400 max-w-md mx-auto leading-relaxed">
        Aradığınız sayfa kaldırılmış, adı değiştirilmiş veya geçici olarak kullanım dışı kalmış olabilir.
    </p>

    <!-- Go Back Button -->
    <div class="mt-10">
        <a href="{{ url_for('main.index') }}" class="inline-flex items-center gap-2 px-6 py-3.5 text-base font-semibold text-white bg-gradient-to-r from-pink-600 to-fuchsia-600 hover:from-pink-500 hover:to-fuchsia-500 rounded-xl shadow-lg shadow-pink-500/10 hover:shadow-pink-500/25 transition-all duration-200 active:scale-[0.98]">
            <i class="fa-solid fa-house text-sm"></i> Ana Sayfaya Dön
        </a>
    </div>
</div>
{% endblock %}
